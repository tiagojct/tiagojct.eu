name: Build & Deploy Quarto site

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: .

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy _site/ via SFTP (password)
        env:
          HOST: ${{ secrets.SFTP_HOST }}
          USER: ${{ secrets.SFTP_USER }}
          PASS: ${{ secrets.SFTP_PASS }}
          PORT: ${{ secrets.SFTP_PORT }}
          TARGET: ${{ secrets.SFTP_TARGET }} # "www"
        run: |
          test -d _site || (echo "_site/ não existe. O render falhou ou o output-dir não é _site." && exit 1)

          sudo apt-get update && sudo apt-get install -y lftp

          lftp -u "$USER","$PASS" -p "$PORT" "sftp://$HOST" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20

          # sanity check (opcional; podes remover depois)
          pwd
          ls

          mirror -R --delete --verbose _site/ "$TARGET"
          bye
          EOF

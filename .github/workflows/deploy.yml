name: Build & Deploy Quarto site

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: .

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy _site/ via rsync over SSH (password)
        env:
          HOST: ${{ secrets.SFTP_HOST }}
          USER: ${{ secrets.SFTP_USER }}
          PASS: ${{ secrets.SFTP_PASS }}
          PORT: ${{ secrets.SFTP_PORT }}
          TARGET: ${{ secrets.SFTP_TARGET }} # usa "www"
        run: |
          test -d _site || (echo "_site/ não existe. O render falhou ou o output-dir não é _site." && exit 1)

          sudo apt-get update
          sudo apt-get install -y sshpass rsync openssh-client

          # (Opcional) sanity check rápido
          sshpass -p "$PASS" ssh -p "$PORT" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$USER@$HOST" "ls -la / && ls -la /$TARGET"

          # Deploy (espelho) — nota: usa /www porque no teu SFTP o root é /
          sshpass -p "$PASS" rsync -az --delete \
            -e "ssh -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            _site/ \
            "$USER@$HOST:/$TARGET/"

name: Build & Deploy Quarto site

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: .

      - name: Deploy _site/ via OpenSSH sftp (password, sftp-only server)
        env:
          HOST: ${{ secrets.SFTP_HOST }}
          USER: ${{ secrets.SFTP_USER }}
          PASS: ${{ secrets.SFTP_PASS }}
          PORT: ${{ secrets.SFTP_PORT }}
          TARGET: ${{ secrets.SFTP_TARGET }} # "www"
        run: |
          test -d _site || (echo "_site/ não existe. O render falhou ou o output-dir não é _site." && exit 1)

          sudo apt-get update
          sudo apt-get install -y sshpass openssh-client

          # Prepara comandos SFTP:
          # 1) ir para o TARGET (www)
          # 2) apagar tudo lá dentro (para ficar "espelho" do build)
          # 3) enviar tudo do _site
          cat > sftp-batch.txt <<EOF
          cd $TARGET
          rm -r *
          put -r _site/*
          bye
          EOF

          # Executa SFTP em modo batch (password via sshpass)
          sshpass -p "$PASS" sftp -P "$PORT" \
            -oBatchMode=no \
            -oStrictHostKeyChecking=accept

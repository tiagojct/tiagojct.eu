name: Build & Deploy Quarto site

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: .

      - name: Backup remote target via SSH (move target to timestamped backup)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: ${{ secrets.SFTP_PORT }}
          script: |
            set -e
            TARGET_DIR="${{ secrets.SFTP_TARGET }}"
            TIMESTAMP="$(date +'%Y%m%d-%H%M%S')"
            BACKUP_NAME="${TARGET_DIR}_backup_${TIMESTAMP}"
            # Ensure the target parent exists and then move the target to a backup name if it exists
            if ssh -oBatchMode=yes -oStrictHostKeyChecking=no -p "${{ secrets.SFTP_PORT }}" "${{ secrets.SFTP_USER }}"@"${{ secrets.SFTP_HOST }}" "test -d \"${TARGET_DIR}\""; then
              echo "Backing up remote ${TARGET_DIR} -> ${BACKUP_NAME}"
              ssh -oBatchMode=no -oStrictHostKeyChecking=no -p "${{ secrets.SFTP_PORT }}" "${{ secrets.SFTP_USER }}"@"${{ secrets.SFTP_HOST }}" "mv \"${TARGET_DIR}\" \"${BACKUP_NAME}\" || true && mkdir -p \"${TARGET_DIR}\""
            else
              echo "Remote target ${TARGET_DIR} does not exist; creating it"
              ssh -oBatchMode=no -oStrictHostKeyChecking=no -p "${{ secrets.SFTP_PORT }}" "${{ secrets.SFTP_USER }}"@"${{ secrets.SFTP_HOST }}" "mkdir -p \"${TARGET_DIR}\""
            fi

      - name: Upload _site/ via SCP (restore into target)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: ${{ secrets.SFTP_PORT }}
          source: "_site/*"
          target: "${{ secrets.SFTP_TARGET }}"
